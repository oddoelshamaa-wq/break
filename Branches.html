<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام نَجَف الذكي | ELSHAMAA</title>
    <style>
        :root {
            --main-blue: #58b4ff;
            --logo-gradient: linear-gradient(90deg, #7b96ff 0%, #48dbfb 100%);
            --dark-bg: #050a0f;
            --card-bg: rgba(255, 255, 255, 0.05);
            --status-iftar: #ff9f43;
            --status-suhoor: #feca57;
            --status-both: #48dbfb;
            --danger: #ff4d4d;
            --success: #2ed573;
            --gold: #feca57;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at 50% 50%, #0a1929 0%, #050a0f 100%);
            min-height: 100vh;
        }

        /* الهيدر المطور مع اللوجو الجديد */
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(88,180,255,0.15);
            position: sticky; top: 0; z-index: 1000;
        }

        .side-brand {
            font-family: 'Arial Black', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            background: var(--logo-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            text-shadow: 0 0 20px rgba(72, 219, 251, 0.3);
        }

        .najaf-center h1 {
            font-size: 3rem; margin: 0; letter-spacing: 5px;
            text-shadow: 0 0 30px var(--main-blue);
            background: linear-gradient(to bottom, #fff 30%, var(--main-blue) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .container { max-width: 1400px; margin: 30px auto; padding: 0 20px; }

        /* قسم التوجيهات العلوي */
        .instruction-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .inst-card {
            background: linear-gradient(145deg, rgba(123,150,255,0.1), rgba(0,0,0,0.4));
            border: 1px solid rgba(88,180,255,0.15);
            border-radius: 20px;
            padding: 20px;
        }

        .inst-card h3 { margin: 0 0 10px 0; color: var(--main-blue); font-size: 1.4rem; }
        .inst-card .phone { color: var(--gold); font-family: monospace; font-weight: bold; font-size: 1.2rem; display: block; margin-bottom: 10px; }
        .inst-card .note { font-size: 0.9rem; line-height: 1.6; opacity: 0.8; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }

        /* شبكة الفروع */
        .branch-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 25px; }
        .branch-card { 
            background: var(--glass); border-radius: 25px; padding: 25px;
            border: 1px solid rgba(255,255,255,0.08); position: relative;
        }
        
        .status-badge { 
            position: absolute; top: 20px; left: 20px; padding: 5px 15px; 
            border-radius: 50px; font-size: 0.8rem; font-weight: bold; color: #000;
        }

        /* عرض الفطار والسحور مع بعض */
        .dual-view { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .prod-column { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.03); }
        .prod-column h5 { margin: 0 0 12px 0; font-size: 1rem; text-align: center; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 0.95rem; }
        .is-out { color: #555; text-decoration: line-through; }
        .out-label { color: var(--danger); font-size: 0.7rem; font-weight: bold; padding: 2px 5px; border: 1px solid var(--danger); border-radius: 4px; }

        /* لوحة الإدارة */
        #adminPanel { display: none; }
        .admin-card { background: #0c1218; border: 1px solid var(--main-blue); padding: 30px; border-radius: 20px; }
        .admin-branch-row { background: #000; border: 1px solid #222; padding: 20px; border-radius: 15px; margin-bottom: 25px; }
        
        input, select, textarea { 
            background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; font-family: inherit;
        }

        .btn { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-blue { background: var(--main-blue); color: #000; }
        .btn-red { background: var(--danger); color: white; }
        .btn-green { background: var(--success); color: #000; }

        #loginOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 2000; }

        @media (max-width: 768px) {
            .dual-view { grid-template-columns: 1fr; }
            .najaf-center h1 { font-size: 2rem; }
            .main-header { padding: 15px 20px; }
        }
    </style>
</head>
<body>

    <!-- شاشة الدخول -->
    <div id="loginOverlay">
        <div style="background: #111; padding: 40px; border-radius: 25px; border: 1px solid var(--main-blue); width: 320px; text-align: center;">
            <h2 style="color: var(--main-blue);">🔐 إدارة نَجَف</h2>
            <input type="text" id="adminUser" placeholder="اسم المستخدم">
            <input type="password" id="adminPass" placeholder="كلمة المرور">
            <button class="btn btn-blue" style="width:100%; margin-top:15px" onclick="attemptLogin()">دخول</button>
            <button onclick="closeLogin()" style="background:none; border:none; color:#555; margin-top:10px; cursor:pointer">إلغاء</button>
        </div>
    </div>

    <header class="main-header">
        <div class="side-brand">ELSHAMAA</div>
        <div class="najaf-center">
            <h1>نَجَف</h1>
        </div>
        <button id="adminBtn" class="btn" style="background: rgba(255,255,255,0.05); color: #fff; border: 1px solid #333;" onclick="toggleAdminView()">⚙️ الإدارة</button>
    </header>

    <div class="container">
        <!-- الواجهة العامة للزبائن -->
        <div id="publicView">
            <h2 style="color: var(--gold); margin-bottom: 25px; display: flex; align-items: center; gap: 15px;">
                <span style="width:40px; height:2px; background:var(--gold);"></span>
                توجيهات التشغيل وخدمة التوصيل
            </h2>
            <div class="instruction-section" id="instructionGrid"></div>

            <h2 style="margin: 50px 0 25px 0; display: flex; align-items: center; gap: 15px;">
                <span style="width:12px; height:12px; background:var(--success); border-radius:50%; box-shadow: 0 0 15px var(--success);"></span>
                الأصناف المتاحة بالفروع (فطار وسحور)
            </h2>
            <div class="branch-grid" id="publicBranchGrid"></div>
        </div>

        <!-- لوحة التحكم -->
        <div id="adminPanel">
            <div class="admin-card">
                <h2 style="color: var(--main-blue); margin-top: 0;">🛠 لوحة إدارة المنظومة</h2>
                <div style="background: rgba(88,180,255,0.05); padding: 20px; border-radius: 15px; margin-bottom: 30px;">
                    <h4>➕ إضافة فرع جديد:</h4>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="newBranchName" placeholder="اكتب اسم الفرع هنا">
                        <button class="btn btn-blue" onclick="addNewBranch()">إضافة</button>
                    </div>
                </div>
                <div id="adminBranchList"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyBojsAZ73wpf-4cD8TviULncyxIIOUO2qY",
            authDomain: "brak-nagaf.firebaseapp.com",
            databaseURL: "https://brak-nagaf-default-rtdb.firebaseio.com",
            projectId: "brak-nagaf",
            storageBucket: "brak-nagaf.firebasestorage.app",
            messagingSenderId: "149166416863",
            appId: "1:149166416863:web:e94fe392f868da07bbda6a"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const dbRef = ref(database, 'nagaf_v5_pro');

        let db = [];
        let isAdmin = false;

        onValue(dbRef, (snapshot) => {
            db = snapshot.val() || [];
            renderAll();
        });

        function sync() { set(dbRef, db); }

        window.attemptLogin = () => {
            if(document.getElementById('adminUser').value==='elshamaa' && document.getElementById('adminPass').value==='0'){
                isAdmin=true;
                document.getElementById('loginOverlay').style.display='none';
                document.getElementById('adminBtn').innerText="🚪 خروج";
                renderAll();
            } else alert("بيانات الدخول خاطئة!");
        };

        window.toggleAdminView = () => {
            if(!isAdmin) document.getElementById('loginOverlay').style.display='flex';
            else { isAdmin=false; renderAll(); document.getElementById('adminBtn').innerText="⚙️ الإدارة"; }
        };

        window.closeLogin = () => document.getElementById('loginOverlay').style.display='none';

        window.addNewBranch = () => {
            const name = document.getElementById('newBranchName').value;
            if(name) {
                db.push({ id: Date.now(), name, phone: '01xxxxxxxxx', note: 'لا توجد ملاحظات', status: 'both', products: [] });
                document.getElementById('newBranchName').value='';
                sync();
            }
        };

        window.addNewProduct = (bId) => {
            const name = document.getElementById(`prodName_${bId}`).value;
            const type = document.getElementById(`prodType_${bId}`).value;
            if(name) {
                const b = db.find(x => x.id === bId);
                if(!b.products) b.products = [];
                b.products.push({ id: Date.now(), name, type, available: true });
                document.getElementById(`prodName_${bId}`).value = '';
                sync();
            }
        };

        window.updateBranchInfo = (id, field, value) => {
            const b = db.find(x => x.id === id);
            if(b) { b[field] = value; sync(); }
        };

        window.toggleProd = (bId, pId) => {
            const b = db.find(x => x.id === bId);
            const p = b.products.find(x => x.id === pId);
            p.available = !p.available;
            sync();
        };

        window.delProd = (bId, pId) => {
            if(confirm('حذف هذا الصنف؟')){
                const b = db.find(x => x.id === bId);
                b.products = b.products.filter(x => x.id !== pId);
                sync();
            }
        };

        window.deleteBranch = (id) => { if(confirm('حذف الفرع نهائياً؟')) { db = db.filter(x => x.id !== id); sync(); } };

        function getStatusAr(stat) {
            if(stat === 'both') return 'فطار وسحور';
            if(stat === 'iftar') return 'فطار فقط';
            if(stat === 'suhoor') return 'سحور فقط';
            return 'مغلق الآن';
        }

        function renderAll() {
            document.getElementById('publicView').style.display = isAdmin ? 'none' : 'block';
            document.getElementById('adminPanel').style.display = isAdmin ? 'block' : 'none';
            if(isAdmin) renderAdmin(); else renderPublic();
        }

        function renderPublic() {
            document.getElementById('instructionGrid').innerHTML = db.map(b => `
                <div class="inst-card">
                    <h3>📍 ${b.name}</h3>
                    <span class="phone">📞 ${b.phone}</span>
                    <div class="note">${b.note}</div>
                </div>
            `).join('');

            document.getElementById('publicBranchGrid').innerHTML = db.map(b => `
                <div class="branch-card" style="opacity: ${b.status==='closed'?'0.5':'1'}">
                    <span class="status-badge" style="background:var(--status-${b.status})">${getStatusAr(b.status)}</span>
                    <h2 style="margin:0 0 10px 0; color:var(--main-blue)">${b.name}</h2>
                    
                    <div class="dual-view">
                        <!-- عمود الفطار -->
                        <div class="prod-column" style="display: ${ (b.status==='both'||b.status==='iftar') ? 'block' : 'none' }">
                            <h5 style="color:var(--status-iftar)">☀️ صنف فطار</h5>
                            ${(b.products||[]).filter(p=>p.type==='فطار' || p.type==='كلا').map(p=>`
                                <div class="item-row ${!p.available?'is-out':''}">
                                    <span>${p.name}</span>
                                    ${!p.available?'<span class="out-label">خلص</span>':''}
                                </div>
                            `).join('') || '<div style="opacity:0.3; font-size:0.8rem">لا يوجد أصناف</div>'}
                        </div>
                        
                        <!-- عمود السحور -->
                        <div class="prod-column" style="display: ${ (b.status==='both'||b.status==='suhoor') ? 'block' : 'none' }">
                            <h5 style="color:var(--status-suhoor)">🌙 صنف سحور</h5>
                            ${(b.products||[]).filter(p=>p.type==='سحور' || p.type==='كلا').map(p=>`
                                <div class="item-row ${!p.available?'is-out':''}">
                                    <span>${p.name}</span>
                                    ${!p.available?'<span class="out-label">خلص</span>':''}
                                </div>
                            `).join('') || '<div style="opacity:0.3; font-size:0.8rem">لا يوجد أصناف</div>'}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderAdmin() {
            document.getElementById('adminBranchList').innerHTML = db.map(b => `
                <div class="admin-branch-row">
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px">
                        <div>
                            <label>اسم الفرع:</label>
                            <input type="text" value="${b.name}" onchange="updateBranchInfo(${b.id}, 'name', this.value)">
                            <label>رقم التليفون:</label>
                            <input type="text" value="${b.phone}" onchange="updateBranchInfo(${b.id}, 'phone', this.value)">
                        </div>
                        <div>
                            <label>عرض الفروع للزبائن:</label>
                            <select onchange="updateBranchInfo(${b.id}, 'status', this.value)">
                                <option value="both" ${b.status==='both'?'selected':''}>عرض الفطار والسحور معاً</option>
                                <option value="iftar" ${b.status==='iftar'?'selected':''}>عرض الفطار فقط</option>
                                <option value="suhoor" ${b.status==='suhoor'?'selected':''}>عرض السحور فقط</option>
                                <option value="closed" ${b.status==='closed'?'selected':''}>إغلاق الفرع مؤقتاً</option>
                            </select>
                            <label>توجيهات التوصيل:</label>
                            <textarea onchange="updateBranchInfo(${b.id}, 'note', this.value)">${b.note}</textarea>
                        </div>
                    </div>
                    
                    <div style="margin-top:20px; border-top:1px solid #222; padding-top:15px">
                        <b>➕ إضافة صنف (فطار أو سحور):</b>
                        <div style="display:flex; gap:10px; margin-top:10px">
                            <input type="text" id="prodName_${b.id}" placeholder="اسم الصنف الجديد">
                            <select id="prodType_${b.id}" style="width:120px">
                                <option value="فطار">فطار ☀️</option>
                                <option value="سحور">سحور 🌙</option>
                                <option value="كلا">كلا ☀️🌙</option>
                            </select>
                            <button class="btn btn-green" onclick="addNewProduct(${b.id})">إضافة الصنف</button>
                        </div>

                        <div style="margin-top:15px">
                            ${(b.products||[]).map(p => `
                                <div style="display:flex; justify-content:space-between; background:#111; padding:8px; margin-bottom:5px; border-radius:8px">
                                    <span>${p.name} <small style="color:#555">(${p.type})</small></span>
                                    <div>
                                        <button class="btn" style="padding:4px 12px; background:${p.available?'#222':'var(--success)'}; color:${p.available?'#fff':'#000'}" onclick="toggleProd(${b.id}, ${p.id})">
                                            ${p.available?'متوفر (اضغط للتعطيل)':'خلص (اضغط للتفعيل)'}
                                        </button>
                                        <button class="btn btn-red" style="padding:4px 12px" onclick="delProd(${b.id}, ${p.id})">حذف</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <button class="btn btn-red" style="width:100%; margin-top:15px; opacity:0.5" onclick="deleteBranch(${b.id})">حذف الفرع نهائياً من المنظومة</button>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
